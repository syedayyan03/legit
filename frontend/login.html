<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | LEGIT</title>
    <link rel="stylesheet" href="css/style.css">
		<link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        .auth-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, rgba(99, 102, 241, 0.1), var(--bg-dark));
        }
        .auth-card {
            width: 100%;
            max-width: 400px;
            padding: 3rem;
            text-align: center;
        }
        .auth-card h2 { margin-bottom: 2rem; font-size: 2rem; }
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); }
        .form-group input { 
            width: 100%; 
            background: rgba(15, 23, 42, 0.6); 
            border: 1px solid var(--border); 
            padding: 0.8rem 1rem; 
            border-radius: 8px; 
            color: white; 
            outline: none;
        }
        .btn-auth {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }
        .auth-footer { margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem; }
        .auth-footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card glass">
            <h2>Welcome Back</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-auth">Login</button>
            </form>
            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Signup</a>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
